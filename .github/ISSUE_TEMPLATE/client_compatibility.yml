name: Client compatibility report
description: Report a client/back-end combination that fails or behaves incorrectly.
title: "[compat][client]: "
labels:
  - compatibility
body:
  - type: input
    id: client
    attributes:
      label: Client
      placeholder: Claude Code, Codex CLI, Continue, custom OpenAI-compatible, ...
    validations:
      required: true

  - type: input
    id: backend
    attributes:
      label: Backend
      placeholder: OpenAI, Anthropic, OpenRouter, Ollama, ChatGPT, custom...
    validations:
      required: true

  - type: input
    id: request_family
    attributes:
      label: Request family
      placeholder: /v1/chat/completions, /v1/responses, /v1/messages

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets and prompt content.
